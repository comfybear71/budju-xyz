name: Deploy to cPanel
on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Use Node.js 18 which has better Web API support
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      # Check package.json contents
      - name: Examine package.json
        run: |
          echo "Package.json dependencies:"
          cat package.json | grep -A 50 '"dependencies":'
          echo ""
          echo "Package.json devDependencies:"
          cat package.json | grep -A 50 '"devDependencies":'
      
      # Make sure the missing package is installed
      - name: Install missing dependencies
        run: |
          npm install
          
      # Install all dependencies
      - name: Install dependencies
        run: npm install
      
      # Verify installed dependencies
      - name: Check node_modules
        run: |
          ls -la node_modules/@vitejs
          ls -la node_modules/@tailwindcss
          ls -la node_modules/vite-plugin-svgr
      
      # Build the project
      - name: Build project
        run: npm run build
      
      # Check if dist folder exists
      - name: Verify build output
        run: |
          ls -la
          if [ -d "dist" ]; then
            echo "✅ Build succeeded! Contents of dist directory:"
            ls -la dist
          else
            echo "❌ Build failed: No dist directory found"
            exit 1
          fi
      
      # Deploy to cPanel via FTP
      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/