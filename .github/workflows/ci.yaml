name: Deploy to cPanel
on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Use Node.js 18 which has better Web API support
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci || npm install
      
      # Make sure the required packages are installed
      - name: Install build dependencies
        run: |
          npm install --save-dev @vitejs/plugin-react-swc
          npm install --save-dev @tailwindcss/vite
          npm install --save-dev vite-plugin-svgr
      
      # Create crypto polyfill
      - name: Create polyfill file
        run: |
          echo '// crypto-polyfill.js
          const crypto = require("crypto");
          if (typeof global !== "undefined") {
            if (!global.crypto) {
              global.crypto = {};
            }
            if (!global.crypto.getRandomValues) {
              global.crypto.getRandomValues = function getRandomValues(array) {
                return crypto.randomFillSync(array);
              };
            }
          }' > crypto-polyfill.js
      
      # Build with the polyfill
      - name: Build project
        run: |
          node --require ./crypto-polyfill.js node_modules/vite/bin/vite.js build
      
      # Verify build output
      - name: Verify build output
        run: |
          ls -la
          if [ -d "dist" ]; then
            echo "✅ Build succeeded! Contents of dist directory:"
            ls -la dist
          else
            echo "❌ Build failed: No dist directory found"
            exit 1
          fi
      
      # Deploy to cPanel via FTP
      - name: Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/