name: Deploy to Vercel

on:
  push:
    branches: [ master, main, claude/restore-solana-website-BgXcP ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v22.14.0
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Create .env file for build
        run: |
          echo "VITE_ENVIRONMENT=${{ secrets.VITE_ENVIRONMENT }}" > .env
          echo "VITE_RPC_ENDPOINT=${{ secrets.VITE_RPC_ENDPOINT }}" >> .env
          echo "VITE_HELIUS_API_KEY=${{ secrets.VITE_HELIUS_API_KEY }}" >> .env
          echo "VITE_TOKEN_ADDRESS=${{ secrets.VITE_TOKEN_ADDRESS }}" >> .env
          echo "VITE_BURN_ADDRESS=${{ secrets.VITE_BURN_ADDRESS }}" >> .env
          echo "VITE_BURN_ADDRESS_ACCOUNT=${{ secrets.VITE_BURN_ADDRESS_ACCOUNT }}" >> .env
          echo "VITE_BANK_ADDRESS=${{ secrets.VITE_BANK_ADDRESS }}" >> .env
          echo "VITE_NFT_TARGET_HOLDERS=${{ secrets.VITE_NFT_TARGET_HOLDERS }}" >> .env
          echo "VITE_SHOP_URL=${{ secrets.VITE_SHOP_URL }}" >> .env
          echo "VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID }}" >> .env
          echo "VITE_SOLANA_RPC_ENDPOINT=${{ secrets.VITE_SOLANA_RPC_ENDPOINT }}" >> .env
          echo "VITE_CRYPTOCOMPARE_API_KEY=${{ secrets.VITE_CRYPTOCOMPARE_API_KEY }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Prepare Vercel Build Output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "src": "/src/assets/(.*)", "dest": "/assets/$1" },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Link Vercel project
        run: vercel link --yes --scope=stuarts-projects-e0d342be --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
